<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Secure Login</h1>

<form action="/login-secure" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username">

    <input
        type="text"
        name="password"
        placeholder="Password">

    <button type="submit">
        Login
    </button>

</form>

<a href="/">Back</a>

</body>
</html>
